<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Demo · Cambio de IA en un clic" subtitle="Réplica fiel de Terminal Sync · cambio de IA en vivo" viewport="1280x820" -->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Sync · Demo cambio de IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --ink:#1d2127; --ink2:#5b616b; --ink3:#9aa0aa;
    --line:#e9eaee; --line2:#e0e2e7; --hover:#f4f5f7; --active:#eef0f3;
    --indigo:#5b56e6; --green:#34b87a; --navy:#1c2230;
    --claude:#d9774f; --claude-bg:#fdf6f1; --claude-tx:#bf6438;
    --codex:#1f9d63;  --codex-bg:#f0faf4;  --codex-tx:#138551;
    --gemini:#3f74f5; --gemini-bg:#eff4ff; --gemini-tx:#2f5fd6;
    --sans:'Geist',system-ui,sans-serif; --mono:'Geist Mono',ui-monospace,monospace;
    --r:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  svg{display:block;}
  .ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ic.sm{width:15px;height:15px;}

  .app{display:flex;flex-direction:column;height:100vh;min-height:600px;overflow:hidden;}

  /* Top bar */
  .top{height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15.5px;}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3f74f5,#7c5cf6);display:grid;place-items:center;}
  .brand .logo i{width:11px;height:11px;border-radius:3px;background:rgba(255,255,255,.9);}
  .top .menu{color:var(--ink2);}
  .search{flex:1;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:9px;height:38px;padding:0 14px;border:1px solid var(--line2);border-radius:999px;color:var(--ink3);background:var(--bg);}
  .search input{border:none;outline:none;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);background:transparent;}
  .top-right{display:flex;align-items:center;gap:14px;}
  .sync{display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13.5px;}
  .btn-navy{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-weight:500;font-size:13.5px;padding:9px 15px;border-radius:999px;}
  .avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);}

  .body{flex:1;display:flex;min-height:0;}

  /* Sidebar */
  .side{width:224px;flex:none;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:14px 12px;gap:3px;}
  .nav-i{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);color:var(--ink2);font-weight:500;font-size:14px;}
  .nav-i:hover{background:var(--hover);}
  .nav-i.on{background:var(--active);color:var(--ink);font-weight:600;}
  .nav-i .badge{margin-left:auto;font-size:12px;color:var(--ink3);}
  .nav-i .chev{color:var(--ink3);}
  .side .spacer{flex:1;}

  /* Content */
  .content{flex:1;display:flex;flex-direction:column;min-width:0;}
  .tabs{height:42px;flex:none;display:flex;align-items:center;gap:4px;padding:0 14px;border-bottom:1px solid var(--line);}
  .tab{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px 8px 0 0;color:var(--ink2);font-size:13px;}
  .tab.on{background:var(--bg);color:var(--ink);font-weight:600;box-shadow:inset 0 -2px 0 var(--ink);}
  .tab .x{color:var(--ink3);width:14px;height:14px;}
  .tabs .exit{margin-left:auto;display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13px;}

  .subhead{height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);}
  .subhead .back{color:var(--ink2);}
  .subhead h2{font-size:16px;margin:0;font-weight:600;}
  .mode-toggle{display:flex;gap:4px;margin-left:4px;}
  .mt{width:34px;height:30px;border-radius:8px;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);}
  .mt.on{background:#efe9ff;border-color:#d9ccff;color:#7c5cf6;}
  .mode-label{color:var(--ink2);font-size:13.5px;}
  .mode-label b{color:var(--ink);}
  .mode-label .mdl{color:var(--ink);font-weight:600;}
  .subhead-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:var(--ink2);}
  .subhead-right .reduce{display:flex;align-items:center;gap:6px;font-size:13px;}

  /* Chat */
  .chat{flex:1;overflow-y:auto;padding:26px clamp(18px,6vw,90px);display:flex;flex-direction:column;gap:22px;background:var(--bg);}
  .row{display:flex;}
  .row.user{justify-content:flex-end;}
  .user-bubble{background:var(--indigo);color:#fff;border-radius:14px;padding:14px 18px;max-width:680px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;box-shadow:0 6px 18px -8px rgba(91,86,230,.5);}
  .handoff{align-self:center;background:var(--hover);border:1px solid var(--line2);color:var(--ink2);font-size:12.5px;padding:7px 14px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;}
  .handoff svg{width:14px;height:14px;stroke:var(--ink3);stroke-width:1.8;fill:none;}

  .ai-card{border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:22px 24px;background:#fff;max-width:none;box-shadow:0 1px 2px rgba(20,22,28,.03),0 14px 34px -26px rgba(20,22,28,.18);}
  .ai-head{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.12em;margin-bottom:14px;}
  .ai-head .dot{width:8px;height:8px;border-radius:50%;}
  .ai-body{font-size:14.5px;line-height:1.62;color:var(--ink);}
  .ai-body h2,.ai-body h3,.ai-body h4{margin:16px 0 8px;letter-spacing:-0.01em;line-height:1.25;}
  .ai-body h2{font-size:18px;} .ai-body h3{font-size:16px;} .ai-body h4{font-size:14.5px;}
  .ai-body > :first-child{margin-top:0;}
  .ai-body p{margin:9px 0;}
  .ai-body ul,.ai-body ol{margin:9px 0;padding-left:20px;} .ai-body li{margin:5px 0;}
  .ai-body strong{font-weight:600;}
  .ai-body hr{border:none;border-top:1px solid var(--line);margin:16px 0;}
  .ai-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13.5px;}
  .ai-body th,.ai-body td{border:1px solid var(--line2);padding:8px 11px;text-align:left;vertical-align:top;}
  .ai-body thead th{background:var(--hover);font-weight:600;}
  .ai-body code{font-family:var(--mono);font-size:12.5px;background:var(--hover);padding:1px 5px;border-radius:5px;}
  .typing{display:inline-flex;gap:5px;}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--ink3);animation:bnc 1s infinite;}
  .typing i:nth-child(2){animation-delay:.15s;} .typing i:nth-child(3){animation-delay:.3s;}
  @keyframes bnc{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
  .chat{scroll-behavior:smooth;}
  .swap-opt.pick{background:var(--hover);box-shadow:inset 0 0 0 1px var(--line2);}

  /* Composer */
  .composer-wrap{flex:none;border-top:1px solid var(--line);padding:14px clamp(18px,6vw,90px) 10px;position:relative;}
  .composer{display:flex;align-items:flex-end;gap:10px;}
  .comp-btn{width:42px;height:42px;flex:none;border:1px solid var(--line2);border-radius:11px;display:grid;place-items:center;color:var(--ink2);background:var(--bg);transition:background .15s,border-color .15s,color .15s;}
  .comp-btn:hover{background:var(--hover);color:var(--ink);}
  .comp-btn.swap.active{border-color:#d9ccff;background:#efe9ff;color:#7c5cf6;}
  .comp-input{flex:1;display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:13px;padding:0 8px 0 14px;min-height:48px;}
  .comp-input:focus-within{border-color:#c9c6f5;}
  .comp-input textarea{flex:1;border:none;outline:none;resize:none;font-family:inherit;font-size:14.5px;color:var(--ink);background:transparent;padding:13px 0;max-height:120px;line-height:1.5;}
  .comp-input textarea::placeholder{color:var(--ink3);}
  .send{display:flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-weight:600;font-size:14px;padding:11px 20px;border-radius:11px;transition:transform .12s,opacity .2s,filter .2s;}
  .send:hover{filter:brightness(1.05);}
  .send:active{transform:scale(.97);}
  .send:disabled{opacity:.55;cursor:not-allowed;}
  .hist{text-align:right;color:var(--ink3);font-size:12px;margin-top:8px;}

  /* Swap menu popover */
  .swap-menu{position:absolute;left:clamp(18px,6vw,90px);bottom:76px;width:280px;background:#fff;border:1px solid var(--line2);border-radius:14px;box-shadow:0 20px 50px -16px rgba(20,22,28,.3);padding:8px;display:none;z-index:30;}
  .swap-menu.show{display:block;animation:pop .16s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .swap-menu .mh{font-size:12px;color:var(--ink3);padding:8px 10px 9px;line-height:1.4;}
  .swap-opt{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;width:100%;text-align:left;font-size:14px;font-weight:500;color:var(--ink);}
  .swap-opt:hover{background:var(--hover);}
  .swap-opt .sd{width:9px;height:9px;border-radius:50%;}
  .swap-opt svg{width:16px;height:16px;stroke:var(--ink3);stroke-width:1.8;fill:none;margin-left:auto;}

  /* Floating assistant */
  .fab{position:fixed;right:22px;bottom:96px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#4f7dfb,#9b5cf6);box-shadow:0 14px 34px -10px rgba(124,92,246,.6);display:grid;place-items:center;color:#fff;}
  .fab .stat{position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:#34b87a;border:2px solid #fff;}

  .demo-hint{position:fixed;left:50%;transform:translateX(-50%);bottom:108px;background:var(--navy);color:#fff;font-size:13px;padding:9px 16px;border-radius:999px;box-shadow:0 12px 30px -10px rgba(0,0,0,.4);display:flex;align-items:center;gap:9px;z-index:50;transition:opacity .4s;}
  .demo-hint b{color:#9be3b4;}
  .demo-hint .rst{margin-left:6px;text-decoration:underline;cursor:pointer;opacity:.8;}
  .replay-btn{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--ink2);border:1px solid var(--line2);background:#fff;padding:8px 15px;border-radius:999px;cursor:pointer;z-index:60;box-shadow:0 10px 30px -12px rgba(20,22,28,.3);}
  .replay-btn:hover{border-color:var(--green);color:var(--green);}
  .replay-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;}
  @media(max-width:920px){.side{display:none;} .search{display:none;}}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <header class="top">
    <button class="menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <div class="brand"><span class="logo"><i></i></span>Terminal Sync</div>
    <div class="search">
      <svg class="ic sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Buscar una sesión, archivo o computadora…" />
    </div>
    <div class="top-right">
      <span class="sync"><svg class="ic sm" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>Sincronizar</span>
      <button class="btn-navy"><svg class="ic sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Nuevo espacio de trabajo</button>
      <span class="avatar"><svg class="ic sm" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
    </div>
  </header>

  <div class="body">
    <!-- SIDEBAR -->
    <aside class="side">
      <div class="nav-i on"><svg class="ic" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Inicio</div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></svg>Espacios de Trabajo<span class="badge">4</span><svg class="ic sm chev" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><path d="m4 7 4 5-4 5"/><path d="M12 17h8"/></svg>Acciones<svg class="ic sm chev" style="margin-left:auto" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><circle cx="8" cy="14" r="4"/><path d="m11 11 8-8 2 2-2 2 2 2-3 3-2-2"/></svg>Secretos</div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Power Ups</div>
      <div class="spacer"></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4 1.5c0 1.5-2 2-2 3"/><path d="M12 17h.01"/></svg>Ayuda</div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>Sugerencias</div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1Z"/></svg>Ajustes</div>
    </aside>

    <!-- CONTENT -->
    <div class="content">
      <div class="tabs">
        <div class="tab"><svg class="ic sm" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>Inicio</div>
        <div class="tab"><svg class="ic sm" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>Proyecto gemini</div>
        <div class="tab"><svg class="ic sm" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>Cambios pagina Web</div>
        <div class="tab on"><svg class="ic sm" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>Agencia<svg class="ic x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></div>
        <span class="exit"><svg class="ic sm" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>Salir de pantalla completa</span>
      </div>

      <div class="subhead">
        <button class="back"><svg class="ic" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
        <h2>Agencia</h2>
        <div class="mode-toggle">
          <span class="mt"><svg class="ic sm" viewBox="0 0 24 24"><path d="m5 8 4 4-4 4"/><path d="M13 16h6"/></svg></span>
          <span class="mt on"><svg class="ic sm" viewBox="0 0 24 24"><path d="m12 3 1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/></svg></span>
        </div>
        <span class="mode-label">Modo: <b>Avanzado</b> · <span class="mdl" id="modeAI">Claude</span></span>
        <div class="subhead-right">
          <svg class="ic" viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
          <svg class="ic" viewBox="0 0 24 24"><path d="M4 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/></svg>
          <span class="reduce"><svg class="ic sm" viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3m8 0v-3a2 2 0 0 1 2-2h3"/></svg>Reducir</span>
          <svg class="ic" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </div>

      <div class="chat" id="chat"></div>

      <div class="composer-wrap">
        <div class="swap-menu" id="swapMenu">

          <button class="comp-btn swap" id="swapBtn" title="Cambiar de IA"><svg class="ic" viewBox="0 0 24 24"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg></button>
          <button class="comp-btn" title="Adjuntar"><svg class="ic" viewBox="0 0 24 24"><path d="M21 12.5 12.5 21a4 4 0 0 1-6-6l8-8a3 3 0 0 1 4 4l-8 8a1.5 1.5 0 0 1-2-2l7-7"/></svg></button>

      </div>
    </div>

</div>

<div class="fab"><span class="stat"></span><svg class="ic" viewBox="0 0 24 24"><path d="m12 3 1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/></svg></div>

<button class="replay-btn" id="reset"><svg viewBox="0 0 24 24"><path d="M3 2v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>Reproducir de nuevo</button>

<script>
(function(){
  'use strict';
  const chat=document.getElementById('chat');
  const input=document.getElementById('input');
  const send=document.getElementById('send');
  const swapBtn=document.getElementById('swapBtn');
  const swapMenu=document.getElementById('swapMenu');
  const swapOpts=document.getElementById('swapOpts');
  const hint=document.getElementById('hint');

  const AIS={
    claude:{name:'Claude',label:'CLAUDE',dot:'var(--claude)',tx:'var(--claude-tx)',bg:'var(--claude-bg)',bd:'var(--claude)'},
    codex :{name:'Codex', label:'CODEX', dot:'var(--codex)', tx:'var(--codex-tx)', bg:'var(--codex-bg)', bd:'var(--codex)'},
    gemini:{name:'Gemini',label:'GEMINI',dot:'var(--gemini)',tx:'var(--gemini-tx)',bg:'var(--gemini-bg)',bd:'var(--gemini)'}
  };
  const Q1='Somos una agencia. Cliente: tienda online de skincare, quiere +30% en ventas este trimestre. Dame un plan de campaña de 90 días: canales, mensajes clave, presupuesto y 3 KPIs.';
  const FOLLOW={
    codex:'Toma la semana 1 de ese plan y conviértela en entregables listos: 2 emails (asunto + cuerpo) y 1 anuncio de Meta (titular + texto), copy final en español. No vuelvas a explicar el plan, solo entrega.',
    gemini:'Hazme un resumen de la conversación hasta ahora, en viñetas claras.',
    claude:'Profundiza en la Fase 1: dame los primeros 5 creativos de Meta Ads con ángulo y copy corto cada uno.'
  };
  // Static showcase content (instant load → good thumbnail; ⇄ continues live from here)
  const CLAUDE_SAMPLE='## Plan de campaña 90 días — Skincare\n\n- **Meta Ads** (60%) — prospección + retargeting\n- **Email** (20%) — bienvenida, carrito, post-compra\n- **Influencers** (20%) — UGC y prueba social\n\n**KPIs:** ROAS ≥ 3.5× · CAC ≤ 40% del ticket · meta +30% en ventas.';
  const CODEX_SAMPLE='## Semana 1 — Entregables\n\n**Email 1 · Bienvenida**\nAsunto: Tu piel no necesita más productos. Necesita la rutina correcta.\n\n**Anuncio Meta · Prospección**\nTitular: Rutinas simples para una piel más saludable.';
  const GEMINI_SAMPLE='## Resumen de la sesión\n\n- Campaña de 90 días para skincare — meta **+30% en ventas**.\n- Canales: Meta Ads (60%), Email (20%), Influencers (20%).\n- Semana 1 ya entregada: 2 emails + 1 anuncio, copy final.\n- KPIs: ROAS ≥ 3.5× · CAC ≤ 40% del ticket.';

  let conversation=[]; let active='claude'; let busy=false;

  // Standalone uses window.claude directly; embedded iframes get a stub that fails,
  // so we fall back to relaying the call to the parent page (which has the real API).
  function relay(payload){
    return new Promise((resolve,reject)=>{
      const id=Math.random().toString(36).slice(2);
      function onMsg(e){const d=e.data;if(!d||d.id!==id)return;
        if(d.type==='ts-claude-result'){cleanup();resolve(d.text);}
        else if(d.type==='ts-claude-error'){cleanup();reject(new Error(d.error));}}
      function cleanup(){window.removeEventListener('message',onMsg);}
      window.addEventListener('message',onMsg);
      (window.parent||window).postMessage({type:'ts-claude-complete',id,payload},'*');
      setTimeout(()=>{cleanup();reject(new Error('timeout'));},45000);
    });
  }
  async function complete(payload){
    if(window.claude&&window.claude.complete){
      try{ return await window.claude.complete(payload); }catch(e){ /* fall back to relay */ }
    }
    if(window.parent&&window.parent!==window){ return relay(payload); }
    throw new Error('IA no disponible');
  }

  function setActive(k){ active=k; document.getElementById('modeAI').textContent=AIS[k].name; }

  function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function md(src){
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(^|[^*])\*(?!\*)(.+?)\*/g,'$1<em>$2</em>').replace(/`(.+?)`/g,'<code>$1</code>');
    const L=src.replace(/\r/g,'').split('\n'); let h='',i=0;
    const cells=l=>l.split('|').map(c=>c.trim()).filter((c,x,a)=>!(x===0&&c==='')&&!(x===a.length-1&&c===''));
    while(i<L.length){const ln=L[i];
      if(/^\s*$/.test(ln)){i++;continue;}
      if(/\|/.test(ln)&&i+1<L.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(L[i+1])){
        const hd=cells(ln);i+=2;const rs=[];
        while(i<L.length&&/\|/.test(L[i])&&L[i].trim()!==''){rs.push(cells(L[i]));i++;}
        h+='<table><thead><tr>'+hd.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+rs.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';continue;}
      let m;
      if(m=ln.match(/^(#{1,4})\s+(.*)/)){const lv=Math.min(m[1].length+1,4);h+='<h'+lv+'>'+inline(m[2])+'</h'+lv+'>';i++;continue;}
      if(/^\s*[-\u2022*]\s+/.test(ln)){const it=[];while(i<L.length&&/^\s*[-\u2022*]\s+/.test(L[i])){it.push(L[i].replace(/^\s*[-\u2022*]\s+/,''));i++;}h+='<ul>'+it.map(t=>'<li>'+inline(t)+'</li>').join('')+'</ul>';continue;}
      if(/^\s*\d+[.)]\s+/.test(ln)){const it=[];while(i<L.length&&/^\s*\d+[.)]\s+/.test(L[i])){it.push(L[i].replace(/^\s*\d+[.)]\s+/,''));i++;}h+='<ol>'+it.map(t=>'<li>'+inline(t)+'</li>').join('')+'</ol>';continue;}
      if(/^\s*[-*_]{3,}\s*$/.test(ln)){h+='<hr>';i++;continue;}
      const p=[ln];i++;while(i<L.length&&!/^\s*$/.test(L[i])&&!/^#{1,4}\s/.test(L[i])&&!/^\s*([-\u2022*]|\d+[.)])\s/.test(L[i])&&!/\|/.test(L[i])){p.push(L[i]);i++;}
      h+='<p>'+inline(p.join(' '))+'</p>';
    }
    return h;
  }

  function scroll(){chat.scrollTop=chat.scrollHeight;}
  function addUser(t){const r=document.createElement('div');r.className='row user';r.innerHTML='<div class="user-bubble">'+escapeHtml(t)+'</div>';chat.appendChild(r);scroll();}
  function addHandoff(k){const d=document.createElement('div');d.className='handoff';d.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg> Continuando con '+AIS[k].name+' — mismo proyecto, mismo contexto.';chat.appendChild(d);scroll();}
  function addAI(k){
    const c=document.createElement('div');c.className='ai-card';
    c.style.borderLeftColor=AIS[k].bd;c.style.background=AIS[k].bg;
    c.innerHTML='<div class="ai-head" style="color:'+AIS[k].tx+'"><span class="dot" style="background:'+AIS[k].dot+'"></span>'+AIS[k].label+'</div><div class="ai-body"><span class="typing"><i></i><i></i><i></i></span></div>';
    chat.appendChild(c);scroll();return c.querySelector('.ai-body');
  }

  function hideHint(){if(hint){hint.style.opacity='0';setTimeout(()=>hint.style.display='none',400);}}
  async function ask(prompt,k,showUser){
    if(busy)return; busy=true; send.disabled=true; hideHint();
    if(showUser)addUser(prompt);
    conversation.push({role:'user',content:prompt});
    const body=addAI(k);
    try{
      const sys=({
        claude:'Eres Claude dentro de TerminalSync, especialista en PENSAR y planear para negocios y agencias. Responde en español, conciso, con markdown simple (## encabezados, **negritas**, tablas, viñetas). Sin emojis.',
        codex :'Eres Codex dentro de TerminalSync, especialista en EJECUTAR. Continúas el trabajo previo usando TODO el contexto, sin volver a pedir nada ni re-explicar. Responde en español con markdown simple. Sin emojis.',
        gemini:'Eres Gemini dentro de TerminalSync, especialista en SÍNTESIS y documentos. Usa todo el contexto previo. Responde en español con markdown simple. Sin emojis.'
      })[k];
      const text=await complete({messages:[{role:'user',content:sys+'\n\nConversación hasta ahora:\n'+conversation.map(m=>(m.role==='user'?'Usuario: ':'IA: ')+m.content).join('\n\n')}]});
      body.innerHTML=text?md(text):'Sin respuesta.';
      conversation.push({role:'assistant',content:text});
      scroll();
    }catch(e){
      body.innerHTML='<span style="color:#c0392b">No se pudo conectar a la IA en este entorno.</span>';
    }
    busy=false; send.disabled=false;
  }

  function buildSwap(){
    swapOpts.innerHTML='';
    Object.keys(AIS).filter(k=>k!==active).forEach(k=>{
      const b=document.createElement('button');b.className='swap-opt';
      b.innerHTML='<span class="sd" style="background:'+AIS[k].dot+'"></span>'+AIS[k].name+'<svg viewBox="0 0 24 24"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>';
      b.onclick=()=>{closeSwap();switchTo(k);};
      swapOpts.appendChild(b);
    });
  }
  function openSwap(){buildSwap();swapMenu.classList.add('show');swapBtn.classList.add('active');}
  function closeSwap(){swapMenu.classList.remove('show');swapBtn.classList.remove('active');}

  function switchTo(k){
    setActive(k); addHandoff(k);
    const f=FOLLOW[k]; addUser(f);
    setTimeout(()=>ask(f,k,false),500);
  }

  send.addEventListener('click',()=>{const v=input.value.trim();if(!v||busy)return;input.value='';ask(v,active,true);});
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send.click();}});
  swapBtn.addEventListener('click',e=>{e.stopPropagation();swapMenu.classList.contains('show')?closeSwap():openSwap();});
  document.addEventListener('click',e=>{if(!swapMenu.contains(e.target)&&e.target!==swapBtn)closeSwap();});

  function reset(){
    timers_clear();
    conversation=[];busy=false;chat.innerHTML='';input.value='';input.disabled=false;send.disabled=false;closeSwap();
    // Seed a representative exchange so the demo (and its thumbnail) sells the AI switch at a glance.
    setActive('claude');
    addUser(Q1); conversation.push({role:'user',content:Q1});
    addAI('claude').innerHTML=md(CLAUDE_SAMPLE); conversation.push({role:'assistant',content:CLAUDE_SAMPLE});
    addHandoff('codex'); setActive('codex');
    conversation.push({role:'user',content:FOLLOW.codex});
    addAI('codex').innerHTML=md(CODEX_SAMPLE); conversation.push({role:'assistant',content:CODEX_SAMPLE});
    chat.scrollTop=0;
    if(hint){hint.style.display='flex';hint.style.opacity='1';}
  }
  function timers_clear(){}
  function wait(ms){return new Promise(r=>setTimeout(r,ms));}
  function scrollBottom(){chat.scrollTop=chat.scrollHeight;}
  let animated=false;
  async function animateSwitch(k){
    openSwap(); await wait(800);
    const opt=[...swapOpts.querySelectorAll('.swap-opt')].find(b=>b.textContent.trim().indexOf(AIS[k].name)>=0);
    if(opt)opt.classList.add('pick');
    await wait(700); closeSwap(); await wait(280);
    addHandoff(k); setActive(k); scrollBottom();
  }
  async function streamAI(k,sample){
    const b=addAI(k); scrollBottom(); await wait(1500);
    b.innerHTML=md(sample); conversation.push({role:'assistant',content:sample}); scrollBottom();
  }
  async function playAnimated(){
    if(animated)return; animated=true; hideHint();
    chat.style.transition='opacity .25s'; chat.style.opacity='0'; await wait(260);
    conversation=[]; chat.innerHTML=''; closeSwap(); setActive('claude'); chat.style.opacity='1';
    addUser(Q1); conversation.push({role:'user',content:Q1}); scrollBottom(); await wait(750);
    await streamAI('claude',CLAUDE_SAMPLE); await wait(1200);
    await animateSwitch('codex'); conversation.push({role:'user',content:FOLLOW.codex}); await wait(500);
    await streamAI('codex',CODEX_SAMPLE); await wait(1200);
    await animateSwitch('gemini'); conversation.push({role:'user',content:FOLLOW.gemini}); await wait(500);
    await streamAI('gemini',GEMINI_SAMPLE);
  }
  document.getElementById('reset').addEventListener('click',function(){animated=false;playAnimated();});
  reset();
  try{var _io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)playAnimated();});},{threshold:.3});_io.observe(document.querySelector('.app'));}catch(e){}
})();
</script>
