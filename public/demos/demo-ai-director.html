<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Demo · AI Director (recomendación de modo + ahorro)" subtitle="Réplica fiel del modal real · Seguir con [IA] en Modo [X] · ES/EN" viewport="1280x820" -->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Sync · AI Director</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#ffffff; --ink:#1d2127; --ink2:#5b616b; --ink3:#9aa0aa;
    --line:#e9eaee; --line2:#e0e2e7; --hover:#f4f5f7; --active:#eef0f3;
    --indigo:#5b56e6; --green:#34b87a; --navy:#1c2230;
    --claude:#d9774f; --claude-tx:#bf6438;
    --codex:#1f9d63;  --codex-tx:#138551;
    --gemini:#3f74f5; --gemini-tx:#2f5fd6;
    --amber:#e8920c; --amber-bg:#fff8ee; --amber-bd:#f1c98a; --amber-tx:#b9720a;
    --save:#1f9d63;
    --sans:'Geist',system-ui,sans-serif; --mono:'Geist Mono',ui-monospace,monospace;
    --r:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  svg{display:block;}
  .ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ic.sm{width:15px;height:15px;}
  .app{display:flex;flex-direction:column;height:100vh;min-height:600px;overflow:hidden;}

  .top{height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15.5px;}
  .logo-img{width:26px;height:26px;object-fit:contain;display:block;}

  .top .menu{color:var(--ink2);}
  .search{flex:1;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:9px;height:38px;padding:0 14px;border:1px solid var(--line2);border-radius:999px;color:var(--ink3);background:var(--bg);}
  .search input{border:none;outline:none;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);background:transparent;}
  .top-right{display:flex;align-items:center;gap:14px;}
  .sync{display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13.5px;}
  .btn-navy{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-weight:500;font-size:13.5px;padding:9px 15px;border-radius:999px;}
  .avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);}

  .body{flex:1;display:flex;min-height:0;}
  .side{width:224px;flex:none;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:14px 12px;gap:8px;}
  .nav-i{display:flex;align-items:center;gap:8px;padding:11px 12px;border-radius:11px;border:1px solid #e8eaed;background:#fff;color:#8b929c;font-weight:600;font-size:14px;cursor:default;}
  .nav-i svg{width:17px;height:17px;}
  .nav-i:hover{border-color:#d0d4db;}
  .nav-i.on{background:#6d3bf5;color:#fff;border-color:#6d3bf5;box-shadow:0 4px 12px rgba(109,59,245,.28);}
  .nav-i .badge{margin-left:auto;font-size:12px;font-weight:500;}
  .nav-i.on .badge{color:rgba(255,255,255,.75);}
  .nav-i .chev{color:#c2c7cf;margin-left:auto;}
  .nav-i.on .chev{color:rgba(255,255,255,.75);}
  .nav-f{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;color:#8b929c;font-weight:500;font-size:13.5px;}
  .nav-f svg{width:17px;height:17px;}
  .nav-f:hover{background:var(--hover);}
  .side .spacer{flex:1;}

  .content{flex:1;display:flex;flex-direction:column;min-width:0;}
  .tabs{height:42px;flex:none;display:flex;align-items:center;gap:4px;padding:0 14px;border-bottom:1px solid var(--line);}
  .tab{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px 8px 0 0;color:var(--ink2);font-size:13px;}
  .tab.on{background:var(--bg);color:var(--ink);font-weight:600;box-shadow:inset 0 -2px 0 var(--ink);}
  .tab .x{color:var(--ink3);width:14px;height:14px;}
  .tabs .exit{margin-left:auto;display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13px;}

  .subhead{height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);}
  .subhead .back{color:var(--ink2);}
  .subhead h2{font-size:16px;margin:0;font-weight:600;}
  .mode-tools{display:flex;gap:4px;margin-left:4px;}
  .mt{width:34px;height:30px;border-radius:8px;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);}
  .mt.on{background:#efe9ff;border-color:#d9ccff;color:#7c5cf6;}
  .mode-pill{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink2);}
  .mode-pill b{color:var(--ink);font-weight:600;transition:color .3s;}
  .mode-pill.bumped b{color:var(--amber-tx);}
  .subhead-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:var(--ink2);}
  .subhead-right .reduce{display:flex;align-items:center;gap:6px;font-size:13px;}

  .chat{flex:1;overflow-y:auto;padding:26px clamp(18px,6vw,90px);display:flex;flex-direction:column;gap:20px;background:var(--bg);scroll-behavior:smooth;}
  .row{display:flex;}
  .row.user{justify-content:flex-end;}
  .user-bubble{background:var(--indigo);color:#fff;border-radius:14px;padding:13px 17px;max-width:620px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;box-shadow:0 6px 18px -8px rgba(91,86,230,.5);}

  .ai-card{border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:18px 22px;background:#fff;box-shadow:0 1px 2px rgba(20,22,28,.03),0 14px 34px -26px rgba(20,22,28,.18);}
  .ai-head{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.12em;margin-bottom:12px;}
  .ai-head .dot{width:8px;height:8px;border-radius:50%;}
  .ai-body{font-size:14.5px;line-height:1.62;color:var(--ink);}
  .ai-body p{margin:9px 0;} .ai-body > :first-child{margin-top:0;} .ai-body > :last-child{margin-bottom:0;}
  .ai-body strong{font-weight:600;}
  .ai-body ul{margin:9px 0;padding-left:20px;} .ai-body li{margin:5px 0;}
  .ai-body ul ul{margin:4px 0;}
  .thinking{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line);border-left:4px solid var(--codex);border-radius:12px;padding:13px 18px;color:var(--ink2);font-size:13.5px;}
  .thinking .sp{width:15px;height:15px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--codex);animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* RECOMMENDATION CARD — faithful to real modal */
  .rec{border:1px solid var(--amber-bd);border-radius:14px;padding:18px 20px;background:var(--amber-bg);box-shadow:0 14px 34px -22px rgba(184,114,10,.5);max-width:560px;}
  .rec-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
  .rec-head .zap{width:24px;height:24px;border-radius:7px;background:#fff;border:1px solid var(--amber-bd);display:grid;place-items:center;color:var(--amber);flex:none;}
  .rec-head .zap svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;}
  .rec-head .lbl{font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.1em;color:var(--amber-tx);}
  .rec-head .conf{font-size:12.5px;color:var(--ink3);margin-left:2px;}
  .rec-reason{font-size:14.5px;line-height:1.55;color:var(--ink);margin-bottom:11px;}
  .rec-line{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:var(--amber-tx);margin-bottom:9px;}
  .rec-line .arr{color:var(--amber);font-size:15px;}
  .rec-save{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--save);font-weight:500;margin-bottom:16px;}
  .rec-save svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;}
  .rec-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .rec-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:9px;transition:transform .12s,filter .2s,background .2s;}
  .rec-btn.up{background:var(--amber);color:#fff;box-shadow:0 8px 20px -10px rgba(232,146,12,.8);}
  .rec-btn.up:hover{filter:brightness(1.05);} .rec-btn.up:active{transform:scale(.97);}
  .rec-btn.keep{background:#fff;border:1px solid var(--line2);color:var(--ink);font-weight:500;}
  .rec-btn.keep:hover{background:var(--hover);}
  .rec-btn.dismiss{color:var(--ink3);font-weight:500;padding:10px 8px;}
  .rec.accepted{border-color:var(--save);background:#f0faf4;transition:background .4s,border-color .4s;}
  .rec.accepted .rec-actions,.rec.accepted .rec-head .conf{display:none;}
  .rec-done{display:none;align-items:center;gap:8px;font-size:13.5px;color:var(--save);font-weight:600;}
  .rec.accepted .rec-done{display:flex;}
  .rec.accepted .zap{border-color:var(--save);color:var(--save);}
  .rec.accepted .lbl{color:var(--save);}
  .rec.accepted .rec-line{color:var(--save);} .rec.accepted .rec-line .arr{color:var(--save);}

  .composer-wrap{flex:none;border-top:1px solid var(--line);padding:14px clamp(18px,6vw,90px) 10px;}
  .composer{display:flex;align-items:flex-end;gap:10px;}
  .comp-btn{width:42px;height:42px;flex:none;border:1px solid var(--line2);border-radius:11px;display:grid;place-items:center;color:var(--ink2);background:var(--bg);}
  .comp-input{flex:1;display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:13px;padding:0 8px 0 14px;min-height:48px;}
  .comp-input textarea{flex:1;border:none;outline:none;resize:none;font-family:inherit;font-size:14.5px;color:var(--ink);background:transparent;padding:13px 0;max-height:120px;line-height:1.5;}
  .comp-input textarea::placeholder{color:var(--ink3);}
  .send{display:flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-weight:600;font-size:14px;padding:11px 20px;border-radius:11px;}
  .hist{text-align:right;color:var(--ink3);font-size:12px;margin-top:8px;}

  .fab{position:fixed;right:22px;bottom:96px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#4f7dfb,#9b5cf6);box-shadow:0 14px 34px -10px rgba(124,92,246,.6);display:grid;place-items:center;color:#fff;}
  .fab .stat{position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:#34b87a;border:2px solid #fff;}
  .lang-pill{position:fixed;right:22px;top:64px;z-index:60;display:inline-flex;gap:3px;padding:4px;background:#fff;border:1px solid var(--line2);border-radius:999px;box-shadow:0 10px 28px -14px rgba(20,22,28,.4);}
  .lang-pill button{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:999px;color:var(--ink2);}
  .lang-pill button.on{background:var(--navy);color:#fff;font-weight:600;}
  .replay-btn{display:none;}
  .replay-btn:hover{}
  .replay-btn svg{}
  .fadein{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(max-width:920px){.side{display:none;} .search{display:none;}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <button class="menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>

      <button class="btn-navy"><svg class="ic sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span data-i="newws">Nuevo espacio de trabajo</span></button>
      <span class="avatar"><svg class="ic sm" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>

  <div class="body">

      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></svg><span data-i="ws">Espacios de Trabajo</span><span class="badge">23</span><svg class="ic sm chev" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>

      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><circle cx="8" cy="14" r="4"/><path d="m11 11 8-8 2 2-2 2 2 2-3 3-2-2"/></svg><span data-i="secretos">Secretos</span></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span data-i="integr">Integraciones</span></div>
      <div class="spacer"></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4 1.5c0 1.5-2 2-2 3"/><path d="M12 17h.01"/></svg><span data-i="ayuda">Ayuda</span></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg><span data-i="sug">Sugerencias</span></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1Z"/></svg><span data-i="ajustes">Ajustes</span></div>
    </aside>

    <div class="content">

        <div class="tab on"><svg class="ic sm" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>Contabilidad<svg class="ic x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></div>
        <span class="exit"><svg class="ic sm" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg><span data-i="exit">Pantalla completa</span></span>

      <div class="subhead">
        <button class="back"><svg class="ic" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>

          <span class="mt"><svg class="ic sm" viewBox="0 0 24 24"><path d="m5 8 4 4-4 4"/><path d="M13 16h6"/></svg></span>
          <span class="mt on"><svg class="ic sm" viewBox="0 0 24 24"><path d="m12 3 1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/></svg></span>

          <svg class="ic" viewBox="0 0 24 24"><path d="M4 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/></svg>
          <span class="reduce"><svg class="ic sm" viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3m8 0v-3a2 2 0 0 1 2-2h3"/></svg><span data-i="reducir">Reducir</span></span>

<script>
(function(){
  'use strict';
  const chat=document.getElementById('chat');
  const modeName=document.getElementById('modeName');
  const modePill=document.getElementById('modePill');

  const AIS={
    claude:{name:'Claude',dot:'var(--claude)',tx:'var(--claude-tx)'},
    codex :{name:'Codex', dot:'var(--codex)', tx:'var(--codex-tx)'},
    gemini:{name:'Gemini',dot:'var(--gemini)',tx:'var(--gemini-tx)'}
  };
  const MODES={ fast:{es:'Rápido',en:'Fast'}, adv:{es:'Avanzado',en:'Advanced'}, expert:{es:'Experto',en:'Expert'} };

  const T={
    es:{search:'Buscar una sesión, archivo o computadora…',sync:'Sincronizar',newws:'Nuevo espacio de trabajo',
      inicio:'Inicio',ws:'Espacios de Trabajo',acciones:'Acciones',secretos:'Secretos',integr:'Integraciones',
      ayuda:'Ayuda',sug:'Sugerencias',ajustes:'Ajustes',exit:'Pantalla completa',modo:'Modo:',reducir:'Reducir',
      ph:'Escribe un mensaje… (Enter para enviar, Shift+Enter salto de línea)',enviar:'Enviar',hist:'Historial de cambios',
      replay:'Otro ejemplo',thinking:'pensando…',
      recLbl:'RECOMENDACIÓN',conf:'Confianza ',
      keep:'Mantener actual',dismiss:'No sugerir',apply:'Aplicar',
      follow:(ia,m)=>'Seguir con '+ia+' pero en Modo '+m,
      switchTo:(ia)=>'Cambiar a '+ia,
      save:(amt,pct)=>amt+' ahorro estimado por turno ('+pct+'% vs Modo Experto)',
      done:(m)=>'Aplicado · Modo '+m+' · contexto intacto',
      doneSwitch:(ia)=>'Cambiado a '+ia+' · contexto intacto'
    },
    en:{search:'Search a session, file or computer…',sync:'Sync',newws:'New workspace',
      inicio:'Home',ws:'Workspaces',acciones:'Actions',secretos:'Secrets',integr:'Integrations',
      ayuda:'Help',sug:'Suggestions',ajustes:'Settings',exit:'Full screen',modo:'Mode:',reducir:'Reduce',
      ph:'Type a message… (Enter to send, Shift+Enter for a new line)',enviar:'Send',hist:'Change history',
      replay:'Another example',thinking:'thinking…',
      recLbl:'RECOMMENDATION',conf:'Confidence ',
      keep:'Keep current',dismiss:'Don\u2019t suggest',apply:'Apply',
      follow:(ia,m)=>'Stay on '+ia+' but in '+m+' mode',
      switchTo:(ia)=>'Switch to '+ia,
      save:(amt,pct)=>amt+' estimated savings per turn ('+pct+'% vs Expert mode)',
      done:(m)=>'Applied · '+m+' mode · context intact',
      doneSwitch:(ia)=>'Switched to '+ia+' · context intact'
    }
  };
  let lang='es';
  const t=()=>T[lang];

  // Scenarios: keep the IA, recommend the right MODE + savings vs Expert
  const SC=[
    { ia:'codex', curMode:'adv', recMode:'fast', conf:63, amt:'$0.030', pct:93,
      user:{es:'¿Puedes convertir un archivo de Google Drive a HTML?',en:'Can you convert a Google Drive file to HTML?'},
      reason:{es:'Consulta liviana — Modo Rápido es eficiente para esto.',en:'Light query — Fast mode is efficient for this.'},
      answer:{es:'<p>Sí. Puedo convertir un archivo de Google Drive a HTML.</p><p>Envíame una de estas opciones:</p><ul><li><strong>El link del archivo</strong> de Google Drive con permisos de acceso.</li><li><strong>El archivo descargado</strong> aquí.</li><li>Indícame si quieres el HTML:<ul><li>simple y limpio,</li><li>con estilos CSS,</li><li>responsive,</li><li>o listo para integrar.</li></ul></li></ul>',
              en:'<p>Yes. I can convert a Google Drive file to HTML.</p><p>Send me one of these:</p><ul><li><strong>The Drive file link</strong> with access permissions.</li><li><strong>The downloaded file</strong> here.</li><li>Tell me if you want the HTML:<ul><li>simple and clean,</li><li>with CSS styles,</li><li>responsive,</li><li>or ready to integrate.</li></ul></li></ul>'} },
    { ia:'claude', curMode:'expert', recMode:'adv', conf:71, amt:'$0.032', pct:80,
      user:{es:'Escríbeme un email de seguimiento para un cliente de la agencia.',en:'Write me a follow-up email for an agency client.'},
      reason:{es:'Redacción estándar — Modo Avanzado da el mejor balance calidad/costo.',en:'Standard writing — Advanced mode gives the best quality/cost balance.'},
      answer:{es:'<p>Listo. Te dejo el email de seguimiento:</p><p><strong>Asunto:</strong> ¿Seguimos avanzando con la web?</p><p>Hola [Nombre], retomo nuestro último intercambio sobre el sitio. Quedé en enviarte la propuesta — ¿te viene bien una llamada de 15 min esta semana para definir los siguientes pasos?</p>',
              en:'<p>Done. Here\u2019s your follow-up email:</p><p><strong>Subject:</strong> Shall we keep moving on the website?</p><p>Hi [Name], following up on our last exchange about the site. I owed you the proposal — would a 15-min call this week work to define next steps?</p>'} },
    { ia:'gemini', curMode:'expert', recMode:'adv', conf:67, amt:'$0.028', pct:78,
      user:{es:'Resume estos 3 PDFs de reportes y dame los puntos clave.',en:'Summarize these 3 report PDFs and give me the key points.'},
      reason:{es:'Resumen de documentos — Modo Avanzado es suficiente y más barato.',en:'Document summary — Advanced mode is enough and cheaper.'},
      answer:{es:'<p>Listo. Puntos clave de los 3 reportes:</p><ul><li><strong>Ingresos</strong>: +12% vs el trimestre anterior.</li><li><strong>Costos</strong>: estables, salvo logística (+8%).</li><li><strong>Acción</strong>: renegociar el proveedor de envíos.</li></ul>',
              en:'<p>Done. Key points from the 3 reports:</p><ul><li><strong>Revenue</strong>: +12% vs last quarter.</li><li><strong>Costs</strong>: stable, except logistics (+8%).</li><li><strong>Action</strong>: renegotiate the shipping provider.</li></ul>'} },
    { ia:'codex', curMode:'fast', recIa:'gemini', conf:61, amt:'$0.031', pct:96,
      user:{es:'Convierte esta captura de pantalla en un HTML que replique la interfaz.',en:'Turn this screenshot into HTML that replicates the interface.'},
      reason:{es:'Esta consulta pide análisis visual. Gemini es el mejor fit.',en:'This request needs visual analysis. Gemini is the best fit.'},
      answer:{es:'<p>Listo — Gemini. Analizo la captura y genero el HTML:</p><ul><li><strong>Estructura</strong>: detecto layout, secciones y jerarquía.</li><li><strong>Estilos</strong>: colores, tipografía y espaciado aproximados.</li><li><strong>Salida</strong>: HTML + CSS responsive, fiel a la imagen.</li></ul>',
              en:'<p>Done — Gemini. I analyze the screenshot and generate the HTML:</p><ul><li><strong>Structure</strong>: I detect layout, sections and hierarchy.</li><li><strong>Styles</strong>: approximate colors, typography and spacing.</li><li><strong>Output</strong>: responsive HTML + CSS, faithful to the image.</li></ul>'} }
  ];
  let scIdx=0;

  function applyStatic(){
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-i]').forEach(el=>{
      const k=el.dataset.i, v=t()[k]; if(typeof v!=='string') return;
      if(el.tagName==='TEXTAREA'||el.tagName==='INPUT') el.placeholder=v; else el.textContent=v;
    });
    document.getElementById('b-es').classList.toggle('on',lang==='es');
    document.getElementById('b-en').classList.toggle('on',lang==='en');
  }
  function setMode(mk){modeName.textContent=MODES[mk][lang];}

  function userMsg(text){const r=document.createElement('div');r.className='row user fadein';r.innerHTML='<div class="user-bubble"></div>';r.querySelector('.user-bubble').textContent=text;chat.appendChild(r);chat.scrollTop=chat.scrollHeight;return r;}
  function thinkingCard(iaKey){const a=AIS[iaKey];const r=document.createElement('div');r.className='row fadein';r.innerHTML='<div class="thinking" style="border-left-color:'+a.dot+'"><span class="sp" style="border-top-color:'+a.dot+'"></span><span class="tx"></span></div>';r.querySelector('.tx').textContent=t().thinking;chat.appendChild(r);chat.scrollTop=chat.scrollHeight;return r;}
  function answerCard(iaKey,html){const a=AIS[iaKey];const r=document.createElement('div');r.className='row fadein';r.innerHTML='<div class="ai-card" style="border-left-color:'+a.dot+'"><div class="ai-head" style="color:'+a.tx+'"><span class="dot" style="background:'+a.dot+'"></span>'+a.name.toUpperCase()+'</div><div class="ai-body">'+html+'</div></div>';chat.appendChild(r);chat.scrollTop=chat.scrollHeight;return r;}

  function recCard(sc){
    const iaN=AIS[sc.ia].name;
    const recM=sc.recMode?MODES[sc.recMode][lang]:'';
    const lineTxt=sc.recIa?t().switchTo(AIS[sc.recIa].name):t().follow(iaN,recM);
    const doneTxt=sc.recIa?t().doneSwitch(AIS[sc.recIa].name):t().done(recM);
    const r=document.createElement('div');r.className='row fadein';
    r.innerHTML=
      '<div class="rec" id="recBox">'+
        '<div class="rec-head"><span class="zap"><svg viewBox="0 0 24 24"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg></span>'+
          '<span class="lbl">'+t().recLbl+'</span><span class="conf">'+t().conf+sc.conf+'%</span></div>'+
        '<div class="rec-reason">'+sc.reason[lang]+'</div>'+
        '<div class="rec-line"><span class="arr">→</span>'+lineTxt+'</div>'+
        '<div class="rec-save"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'+t().save(sc.amt,sc.pct)+'</div>'+
        '<div class="rec-actions">'+
          '<button class="rec-btn up" id="recUp">'+t().apply+'</button>'+
          '<button class="rec-btn keep">'+t().keep+'</button>'+
          '<button class="rec-btn dismiss">✕ '+t().dismiss+'</button>'+
        '</div>'+
        '<div class="rec-done"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none"><path d="M20 6 9 17l-5-5"/></svg>'+doneTxt+'</div>'+
      '</div>';
    chat.appendChild(r);chat.scrollTop=chat.scrollHeight;return r;
  }

  let timers=[],playing=false;
  function sleep(ms){return new Promise(res=>{timers.push(setTimeout(res,ms));});}
  function clearAll(){timers.forEach(clearTimeout);timers=[];}

  async function play(){
    if(playing) return; playing=true;
    chat.innerHTML='';
    const sc=SC[scIdx];
    setMode(sc.curMode); modePill.classList.remove('bumped');

    userMsg(sc.user[lang]); await sleep(750);
    const th=thinkingCard(sc.ia); await sleep(1400); th.remove();
    answerCard(sc.ia, sc.answer[lang]); await sleep(1100);

    recCard(sc);
    const up=document.getElementById('recUp');
    let accepted=false;
    const accept=async()=>{
      if(accepted)return; accepted=true;
      document.getElementById('recBox').classList.add('accepted');
      if(sc.recMode){ setMode(sc.recMode); modePill.classList.add('bumped'); }
      chat.scrollTop=chat.scrollHeight;
      playing=false;
    };
    up.addEventListener('click',accept);
    await sleep(2400); accept();
  }
  function restart(advance){
    clearAll(); playing=false;
    if(advance) scIdx=(scIdx+1)%SC.length;
    chat.innerHTML=''; play();
  }

  document.getElementById('reset').addEventListener('click',()=>restart(true));
  document.getElementById('send').addEventListener('click',()=>restart(true));
  document.getElementById('b-es').addEventListener('click',()=>{lang='es';applyStatic();restart(false);});
  document.getElementById('b-en').addEventListener('click',()=>{lang='en';applyStatic();restart(false);});

  applyStatic(); setMode('adv');
  let started=false;
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting&&!started){started=true;play();}});},{threshold:.25});
  io.observe(chat);
  setTimeout(()=>{if(!started){started=true;play();}},600);
})();
</script>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  if(p.get('embed')==='1'){
    var rb=document.querySelector('.replay-btn');
    if(rb){ rb.style.display='none'; }
  }
})();
</script>
</body>
