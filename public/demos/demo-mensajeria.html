<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Demo · Tu trabajo te sigue hasta el chat (WhatsApp/Telegram)" subtitle="Continuidad por mensajería: la misma conversación sigue en el celular · ES/EN" viewport="1000x620" -->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Sync · Tu trabajo te sigue hasta el chat</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1d2127;--ink2:#5b616b;--ink3:#9aa0aa;--line:#e7e8ec;
    --indigo:#5b56e6;--claude:#d9774f;--claude-bg:#fdf6f1;--claude-tx:#bf6438;--accent:#0f9d6e;
    --wa:#25d366;--wa-dk:#075e54;--wa-bg:#e5ddd5;--wa-out:#dcf8c6;
    --tg:#2aabee;--tg-dk:#1c93d8;--tg-bg:#cfe6f2;--tg-out:#eeffde;
    --bezel:#11141a;
    --sans:'Geist',system-ui,sans-serif;--mono:'Geist Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:
      radial-gradient(70% 60% at 50% 0%,#ffffff,transparent 70%),
      linear-gradient(180deg,#f7f5f1,#eef0ee);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:26px 18px;min-height:100vh;-webkit-font-smoothing:antialiased;}

  .scene{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(8px,2.6vw,34px);width:100%;max-width:1000px;}

  /* ---------- left: desktop terminal where it started ---------- */
  .deskwrap{display:flex;flex-direction:column;align-items:center;gap:13px;transition:opacity .5s,filter .5s;}
  .deskwrap.dim{opacity:.45;filter:saturate(.85);}
  .desk{width:100%;max-width:360px;}
  .desk .lid{background:var(--bezel);border:6px solid var(--bezel);border-radius:12px 12px 0 0;box-shadow:0 24px 50px -30px rgba(0,0,0,.5);}
  .desk .base{height:11px;background:linear-gradient(#c4c8cf,#9aa0aa);border-radius:0 0 14px 14px;width:118%;margin-left:-9%;box-shadow:0 10px 18px -10px rgba(0,0,0,.35);}
  .screen{background:#fff;border-radius:6px;overflow:hidden;aspect-ratio:16/10.5;display:flex;flex-direction:column;font-size:10px;}
  .mini-bar{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid var(--line);font-weight:600;font-size:10px;}
  .mini-bar .mb-dot{width:7px;height:7px;border-radius:50%;background:var(--claude);}
  .mini-bar .mb-sync{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--accent);font-weight:500;display:flex;align-items:center;gap:4px;}
  .mini-bar .mb-sync::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);}
  .mini-chat{flex:1;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;overflow:hidden;}
  .mu{align-self:flex-end;background:var(--indigo);color:#fff;border-radius:9px;padding:6px 9px;max-width:80%;font-size:9px;line-height:1.4;}
  .mu .src{display:block;font-size:6.5px;font-family:var(--mono);opacity:.7;margin-bottom:2px;letter-spacing:.06em;}
  .mb-sync.flash{animation:syncf 1s ease;}
  @keyframes syncf{0%,100%{color:var(--accent);}30%{color:#0b8a5f;font-weight:700;}}
  .mc{border:1px solid var(--line);border-left:3px solid var(--claude);background:var(--claude-bg);border-radius:8px;padding:8px 10px;}
  .mc-h{font-family:var(--mono);font-size:7px;font-weight:600;letter-spacing:.1em;color:var(--claude-tx);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
  .mc-h::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--claude);}
  .mc .tx{font-size:9px;line-height:1.45;}
  .dev-label{font-family:var(--mono);font-size:11px;color:var(--ink2);letter-spacing:.02em;text-align:center;}
  .dev-label b{color:var(--ink);font-weight:600;}

  /* ---------- middle: handoff arrow ---------- */
  .flow{display:flex;flex-direction:column;align-items:center;gap:9px;color:var(--accent);}
  .flow .ln{width:1.5px;height:30px;background:linear-gradient(var(--accent),transparent);} 
  .flow .pulse{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid #bfe8d2;display:grid;place-items:center;box-shadow:0 8px 20px -10px rgba(15,157,110,.5);}
  .flow .pulse svg{width:17px;height:17px;stroke:var(--accent);stroke-width:2;fill:none;}
  .flow .cap{font-family:var(--mono);font-size:8.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;max-width:90px;text-align:center;line-height:1.4;}
  @media(max-width:760px){.scene{grid-template-columns:1fr;}.flow{flex-direction:row;}.flow .ln{width:30px;height:1.5px;background:linear-gradient(90deg,var(--accent),transparent);}}

  /* ---------- right: phone ---------- */
  .phonewrap{display:flex;flex-direction:column;align-items:center;gap:11px;}
  .phone{width:100%;max-width:204px;background:var(--bezel);border-radius:28px;padding:8px;box-shadow:0 30px 60px -28px rgba(0,0,0,.55);position:relative;}
  .phone::before{content:"";position:absolute;top:13px;left:50%;transform:translateX(-50%);width:42px;height:5px;border-radius:3px;background:#2c313b;z-index:5;}
  .pscreen{background:#fff;border-radius:21px;overflow:hidden;aspect-ratio:9/17.5;display:flex;flex-direction:column;}

  /* chat app header — morphs platform */
  .chead{display:flex;align-items:center;gap:9px;padding:26px 13px 11px;color:#fff;}
  .chead.ts{background-color:#1b1f26;}
  .chead.wa{background-color:var(--wa-dk);}
  .chead.tg{background-color:var(--tg-dk);}
  .chead .av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.16);display:grid;place-items:center;flex:none;}
  .chead .av svg{width:17px;height:17px;stroke:#fff;stroke-width:1.8;fill:none;}
  .chead .who{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
  .chead .who b{font-size:12px;font-weight:600;}
  .chead .who span{font-size:9px;opacity:.8;font-family:var(--mono);}
  .chead .plat{margin-left:auto;font-family:var(--mono);font-size:8px;font-weight:600;padding:3px 7px;border-radius:999px;background:rgba(255,255,255,.16);white-space:nowrap;}

  .pbody{flex:1;display:flex;flex-direction:column;gap:8px;padding:12px 11px;overflow:hidden;font-size:10.5px;}
  .pbody.ts{background-color:#f4f5f7;}
  .pbody.wa{background-color:var(--wa-bg);}
  .pbody.tg{background-color:var(--tg-bg);}

  .handoff{align-self:center;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.82);border:1px solid rgba(0,0,0,.06);color:var(--ink2);font-family:var(--mono);font-size:8px;font-weight:500;padding:4px 10px;border-radius:999px;margin:2px 0;box-shadow:0 4px 10px -6px rgba(0,0,0,.25);}
  .handoff svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;}

  .b{max-width:84%;padding:7px 10px;border-radius:12px;line-height:1.42;font-size:10.5px;box-shadow:0 1px 1px rgba(0,0,0,.06);position:relative;}
  .b .meta{display:block;font-size:7.5px;opacity:.55;margin-top:3px;text-align:right;font-family:var(--mono);}
  .b.ai{align-self:flex-start;background:#fff;color:var(--ink);border-top-left-radius:4px;}
  .b.ai .nm{font-family:var(--mono);font-size:7.5px;font-weight:600;letter-spacing:.08em;color:var(--claude-tx);display:flex;align-items:center;gap:4px;margin-bottom:4px;}
  .b.ai .nm::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--claude);}
  .b.ai.gem .nm{color:#2f5fd6;} .b.ai.gem .nm::before{background:#5b9cff;}
  .b.me{align-self:flex-end;border-top-right-radius:4px;}
  .pbody.wa .b.me{background:var(--wa-out);}
  .pbody.tg .b.me{background:var(--tg-out);}
  .pbody.ts .b.me{background:var(--indigo);color:#fff;}
  .b.sys{align-self:flex-start;background:#fff;border-left:3px solid var(--accent);color:var(--ink);font-size:10px;}
  .b.sys b{color:var(--accent);}

  .typing{align-self:flex-end;display:flex;gap:3px;padding:8px 11px;background:#fff;border-radius:12px;border-top-right-radius:4px;}
  .pbody.ts .typing{background:#fff;}
  .typing i{width:5px;height:5px;border-radius:50%;background:var(--ink3);animation:tw 1.1s infinite;}
  .typing i:nth-child(2){animation-delay:.16s;} .typing i:nth-child(3){animation-delay:.32s;}
  @keyframes tw{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

  /* composer mock */
  .pcomp{display:flex;align-items:center;gap:7px;padding:8px 10px;background:#fff;border-top:1px solid var(--line);}
  .pcomp .field{flex:1;height:24px;border-radius:999px;background:#f0f1f3;display:flex;align-items:center;padding:0 11px;font-size:9px;color:var(--ink3);}
  .pcomp .field .cur{display:inline-block;width:1.5px;height:11px;background:var(--ink2);margin-left:1px;animation:bk 1s steps(1) infinite;}
  @keyframes bk{50%{opacity:0;}}
  .pcomp .snd{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:none;color:#fff;}
  .pcomp.wa .snd{background-color:var(--wa);} .pcomp.tg .snd{background-color:var(--tg);} .pcomp.ts .snd{background-color:var(--accent);}
  .pcomp .snd svg{width:12px;height:12px;stroke:#fff;stroke-width:2;fill:none;}

  .fadein{animation:fd .4s ease;}
  @keyframes fd{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .caption{font-family:var(--mono);font-size:11px;color:var(--ink2);text-align:center;max-width:520px;line-height:1.5;min-height:32px;transition:opacity .3s;}
  .caption b{color:var(--ink);font-weight:600;}

  .lang-pill{position:fixed;right:16px;top:14px;z-index:60;display:inline-flex;gap:3px;padding:4px;background:#fff;border:1px solid var(--line);border-radius:999px;box-shadow:0 10px 28px -14px rgba(20,22,28,.4);}
  .lang-pill button{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:999px;color:var(--ink2);border:none;background:none;cursor:pointer;}
  .lang-pill button.on{background:var(--bezel);color:#fff;font-weight:600;}
  .replay-btn{display:none;}
  .replay-btn:hover{}
  .replay-btn svg{}
</style>
</head>
<body>
<div class="scene">
  <!-- LEFT: where it started -->
  <div class="deskwrap" id="deskwrap">
    <div class="desk">
      <div class="lid">
        <div class="screen">
          <div class="mini-bar"><span class="mb-dot"></span><span data-i="proj">Proyecto · Cotizaciones</span><span class="mb-sync" id="mbSync" data-i="sync">Sincronizado</span></div>
          <div class="mini-chat" id="miniChat">
            <div class="mu" data-i="d_u">Hazme la cotización para el cliente Martínez.</div>
            <div class="mc"><div class="mc-h">CLAUDE</div><div class="tx" data-i="d_a">Lista. ¿Te la envío por correo o ajustamos el precio primero?</div></div>
          </div>
        </div>
      </div>
      <div class="base"></div>
    </div>
    <div class="dev-label"><b data-i="lbl_desk">TerminalSync</b> · <span data-i="lbl_desk2">en tu computador</span></div>
  </div>

  <!-- MIDDLE: handoff -->
  <div class="flow">
    <div class="ln"></div>
    <div class="pulse"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="cap" data-i="flowcap">Misma conversación</div>
    <div class="ln"></div>
  </div>

  <!-- RIGHT: phone -->
  <div class="phonewrap">
    <div class="phone">
      <div class="pscreen">
        <div class="chead ts" id="chead">
          <span class="av" id="cheadAv"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></span>
          <span class="who"><b id="cheadName">TerminalSync</b><span id="cheadStat" data-i="online">en línea</span></span>
          <span class="plat" id="cheadPlat" data-i="platTs">App</span>
        </div>
        <div class="pbody ts" id="pbody"></div>
        <div class="pcomp ts" id="pcomp">
          <span class="field" id="pfield"><span data-i="ph">Mensaje</span></span>
          <span class="snd"><svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></span>
        </div>
      </div>
    </div>
    <div class="dev-label"><b data-i="lbl_phone">En tu celular</b> · WhatsApp · Telegram</div>
  </div>
</div>

<div class="caption" id="caption"></div>

<div class="lang-pill"><button id="b-es" class="on">ES</button><button id="b-en">EN</button></div>
<button class="replay-btn" id="reset"><svg viewBox="0 0 24 24"><path d="M3 2v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg><span data-i="replay">Reproducir de nuevo</span></button>

<script>
(function(){
  'use strict';
  const pbody=document.getElementById('pbody');
  const chead=document.getElementById('chead');
  const pcomp=document.getElementById('pcomp');
  const cheadName=document.getElementById('cheadName');
  const cheadStat=document.getElementById('cheadStat');
  const cheadPlat=document.getElementById('cheadPlat');
  const cheadAv=document.getElementById('cheadAv');
  const pfield=document.getElementById('pfield');
  const caption=document.getElementById('caption');
  const deskwrap=document.getElementById('deskwrap');
  const miniChat=document.getElementById('miniChat');
  const mbSync=document.getElementById('mbSync');
  function mirrorToDesk(text, plat){
    const m=document.createElement('div'); m.className='mu fadein';
    m.innerHTML='<span class="src">'+plat+' →</span>'+text;
    miniChat.appendChild(m);
    mbSync.classList.remove('flash'); void mbSync.offsetWidth; mbSync.classList.add('flash');
  }

  const AV={
    ts:'<svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
    wa:'<svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 21l2.1-5.4A8.5 8.5 0 1 1 21 11.5Z"/></svg>',
    tg:'<svg viewBox="0 0 24 24"><path d="m22 3-9.5 18-3-7.5L2 10z"/><path d="M22 3 9.5 13.5"/></svg>'
  };

  const T={
    es:{
      proj:'Proyecto · Cotizaciones',sync:'Sincronizado',
      d_u:'Hazme la cotización para el cliente Martínez.',
      d_a:'Lista. ¿Te la envío por correo o ajustamos el precio primero?',
      lbl_desk:'TerminalSync',lbl_desk2:'en tu computador',lbl_phone:'En tu celular',
      online:'en línea',ph:'Mensaje',replay:'Reproducir de nuevo',
      platTs:'App',platWa:'WhatsApp',platTg:'Telegram',flowcap:'Misma conversación',
      capStart:'Empezaste la conversación en <b>TerminalSync</b>, en tu computador.',
      capWa:'Saliste de la oficina. La conversación <b>sigue en WhatsApp</b> — la misma, con todo el contexto.',
      capTg:'Más tarde, desde <b>Telegram</b>: respondes un mensaje y tus IAs siguen trabajando.',
      capEnd:'<b>Tu trabajo te sigue hasta el chat.</b> Si puedes escribir un mensaje, puedes seguir dirigiendo.',
      // WhatsApp thread
      wa_sys:'Claude llegó a su límite en <b>Cotizaciones</b>. ¿Seguimos con Gemini?',
      wa_me:'Sí, seguí y avísame cuando termine.',
      wa_ai:'Listo, sigo con Gemini — mismo contexto. Trabajando en la cotización de Martínez. 👍',
      // Telegram thread
      tg_me:'¿Cómo va la cotización?',
      tg_ai:'✅ Terminé. Cotización de Martínez lista: $4.820. ¿La envío por correo?',
      tg_me2:'Envíala.',
      tg_ai2:'Enviada al correo del cliente. ✅ Te aviso cuando responda.'
    },
    en:{
      proj:'Project · Quotes',sync:'Synced',
      d_u:'Make the quote for client Martínez.',
      d_a:'Done. Should I email it or adjust the price first?',
      lbl_desk:'TerminalSync',lbl_desk2:'on your computer',lbl_phone:'On your phone',
      online:'online',ph:'Message',replay:'Play again',
      platTs:'App',platWa:'WhatsApp',platTg:'Telegram',flowcap:'Same conversation',
      capStart:'You started the conversation in <b>TerminalSync</b>, on your computer.',
      capWa:'You left the office. The conversation <b>continues on WhatsApp</b> — the same one, with all the context.',
      capTg:'Later, from <b>Telegram</b>: you reply a message and your AIs keep working.',
      capEnd:'<b>Your work follows you into the chat.</b> If you can write a message, you can keep directing.',
      wa_sys:'Claude hit its limit in <b>Quotes</b>. Continue with Gemini?',
      wa_me:'Yes, keep going and let me know when it\u2019s done.',
      wa_ai:'On it, continuing with Gemini — same context. Working on Martínez\u2019s quote. 👍',
      tg_me:'How\u2019s the quote going?',
      tg_ai:'✅ Done. Martínez\u2019s quote ready: $4,820. Email it?',
      tg_me2:'Send it.',
      tg_ai2:'Sent to the client\u2019s email. ✅ I\u2019ll tell you when they reply.'
    }
  };
  let lang=(new URLSearchParams(location.search).get('lang')==='en')?'en':'es';
  const _embed=new URLSearchParams(location.search).get('embed')==='1';
  const t=()=>T[lang];

  function applyStatic(){
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-i]').forEach(el=>{ const v=t()[el.dataset.i]; if(typeof v==='string') el.textContent=v; });
    document.getElementById('b-es').classList.toggle('on',lang==='es');
    document.getElementById('b-en').classList.toggle('on',lang==='en');
  }

  let timers=[],playing=false;
  function sleep(ms){return new Promise(res=>timers.push(setTimeout(res,ms)));}
  function clearAll(){timers.forEach(clearTimeout);timers=[];}
  function cap(html){caption.style.opacity='0';return new Promise(res=>{timers.push(setTimeout(()=>{caption.innerHTML=html;caption.style.opacity='1';res();},220));});}

  const SURF_BG={
    ts:{head:'#1b1f26',body:'#f4f5f7',snd:'#0f9d6e'},
    wa:{head:'#075e54',body:'#e5ddd5',snd:'#25d366'},
    tg:{head:'#1c93d8',body:'#cfe6f2',snd:'#2aabee'}
  };
  function setSurface(s){
    chead.className='chead '+s; pbody.className='pbody '+s; pcomp.className='pcomp '+s;
    const c=SURF_BG[s];
    chead.style.backgroundColor=c.head;
    pbody.style.backgroundColor=c.body;
    const snd=pcomp.querySelector('.snd'); if(snd) snd.style.backgroundColor=c.snd;
    cheadAv.innerHTML=AV[s];
    cheadName.textContent = s==='ts'?'TerminalSync':(s==='wa'?'TerminalSync':'TerminalSync');
    cheadStat.textContent = t().online;
    cheadPlat.textContent = s==='ts'?t().platTs:(s==='wa'?t().platWa:t().platTg);
  }
  function add(cls,html,withMeta){
    const b=document.createElement('div');b.className='b '+cls+' fadein';
    b.innerHTML=html + (withMeta?'<span class="meta">'+nowTime()+'</span>':'');
    pbody.appendChild(b);pbody.scrollTop=pbody.scrollHeight;return b;
  }
  function sys(html){const b=document.createElement('div');b.className='b sys fadein';b.innerHTML=html;pbody.appendChild(b);pbody.scrollTop=pbody.scrollHeight;return b;}
  function handoff(label){const d=document.createElement('div');d.className='handoff fadein';d.innerHTML='<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'+label;pbody.appendChild(d);pbody.scrollTop=pbody.scrollHeight;}
  function nowTime(){return '';}
  function aiName(which){return which==='gem'?'GEMINI':'CLAUDE';}

  async function typeField(text){
    pfield.innerHTML=''; let i=0;
    return new Promise(res=>{
      const iv=setInterval(()=>{ pfield.textContent=text.slice(0,++i); if(i>=text.length){clearInterval(iv);pfield.innerHTML=text+'<span class="cur"></span>';res();} },34);
      timers.push(iv);
    });
  }
  async function showTyping(){const x=document.createElement('div');x.className='typing fadein';x.innerHTML='<i></i><i></i><i></i>';pbody.appendChild(x);pbody.scrollTop=pbody.scrollHeight;await sleep(900);x.remove();}
  function resetField(){pfield.innerHTML='<span>'+t().ph+'</span>';}

  const miniChatHTML=miniChat.innerHTML;
  async function play(){
    if(playing)return; playing=true;
    clearAll(); pbody.innerHTML=''; deskwrap.classList.remove('dim');
    miniChat.innerHTML=miniChatHTML;
    setSurface('ts'); resetField();
    await cap(t().capStart);
    add('me', t().d_u, true); await sleep(700);
    add('ai', '<span class="nm">CLAUDE</span>'+t().d_a, true);
    await sleep(1500);

    // --- hand off to WhatsApp ---
    await cap(t().capWa);
    setSurface('wa');
    handoff(t().platWa);
    await sleep(500);
    sys(t().wa_sys); await sleep(1300);
    // client types from phone
    await typeField(t().wa_me); await sleep(450);
    add('me', t().wa_me, true); mirrorToDesk(t().wa_me, t().platWa); resetField(); await sleep(700);
    await showTyping();
    add('ai gem', '<span class="nm">GEMINI</span>'+t().wa_ai, true);
    await sleep(1800);

    // --- continue on Telegram ---
    await cap(t().capTg);
    setSurface('tg');
    handoff(t().platTg);
    await sleep(500);
    await typeField(t().tg_me); await sleep(400);
    add('me', t().tg_me, true); mirrorToDesk(t().tg_me, t().platTg); resetField(); await sleep(650);
    await showTyping();
    add('ai gem', '<span class="nm">GEMINI</span>'+t().tg_ai, true);
    await sleep(1500);
    await typeField(t().tg_me2); await sleep(350);
    add('me', t().tg_me2, true); mirrorToDesk(t().tg_me2, t().platTg); resetField(); await sleep(600);
    await showTyping();
    add('ai gem', '<span class="nm">GEMINI</span>'+t().tg_ai2, true);
    await sleep(1200);
    await cap(t().capEnd);
    playing=false;
  }
  function restart(){clearAll();playing=false;play();}

  document.getElementById('reset').addEventListener('click',restart);
  document.getElementById('b-es').addEventListener('click',()=>{lang='es';applyStatic();restart();});
  document.getElementById('b-en').addEventListener('click',()=>{lang='en';applyStatic();restart();});

  applyStatic();
  if(_embed){const p=document.querySelector('.lang-pill');if(p)p.style.display='none';}
  let started=false;
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting&&!started){started=true;play();}});},{threshold:.2});
  io.observe(document.querySelector('.scene'));
  setTimeout(()=>{if(!started){started=true;play();}},700);
})();
</script>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  if(p.get('embed')==='1'){
    var rb=document.querySelector('.replay-btn');
    if(rb){ rb.style.display='none'; }
  }
})();
</script>
