<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Demo · Home (espacios de trabajo)" subtitle="Vista principal · Comparador de IAs · Grid · ES/EN" viewport="1280x820" -->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Sync · Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#ffffff; --ink:#1d2127; --ink2:#5b616b; --ink3:#9aa0aa;
    --line:#e9eaee; --line2:#e0e2e7; --hover:#f4f5f7; --active:#eef0f3;
    --violet:#6d3bf5; --navy:#1c2230;
    --claude:#d97757; --codex:#10a37f; --gemini:#4a7cf0;
    --sans:'Geist',system-ui,sans-serif; --mono:'Geist Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  svg{display:block;}
  .ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ic.sm{width:15px;height:15px;}
  .app{display:flex;flex-direction:column;height:100vh;min-height:600px;overflow:hidden;}

  /* ── Top bar ── */
  .top{height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15.5px;}
  .logo-img{width:26px;height:26px;object-fit:contain;display:block;}

  .top .menu{color:var(--ink2);}
  .search{flex:1;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:9px;height:38px;padding:0 14px;border:1px solid var(--line2);border-radius:999px;color:var(--ink3);background:var(--bg);}
  .search input{border:none;outline:none;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);background:transparent;}
  .top-right{display:flex;align-items:center;gap:14px;}
  .sync{display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13.5px;}
  .btn-navy{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-weight:500;font-size:13.5px;padding:9px 15px;border-radius:999px;}
  .avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);}

  /* ── Body layout ── */
  .body{flex:1;display:flex;min-height:0;}

  /* ── Sidebar ── */
  .side{width:224px;flex:none;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:14px 12px;gap:6px;background:#f3f4f6;}
  .nav-i{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:11px;border:1px solid #e2e4e8;background:#fff;color:#26292e;font-weight:700;font-size:13.5px;cursor:default;}
  .nav-i svg{width:17px;height:17px;stroke:#4b5260;flex:none;}
  .nav-i:hover{border-color:#c8cbd2;background:#fff;}
  .nav-i.on{background:#6d3bf5;color:#fff;border-color:#6d3bf5;box-shadow:0 4px 14px rgba(109,59,245,.32);}
  .nav-i.on svg{stroke:#fff;}
  .nav-i .badge{margin-left:auto;font-size:12px;font-weight:600;color:#6b7280;}
  .nav-i.on .badge{color:rgba(255,255,255,.8);}
  .nav-i .chev{color:#b0b6c1;margin-left:auto;flex:none;}
  .nav-i.on .chev{color:rgba(255,255,255,.7);}
  .nav-f{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:8px;color:#4b5260;font-weight:600;font-size:13.5px;}
  .nav-f svg{width:17px;height:17px;stroke:#6b7280;flex:none;}
  .nav-f:hover{background:#e9eaed;}
  .side .spacer{flex:1;}

  /* ── Content area ── */
  .content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

  /* ── Tab bar (original app style) ── */
  .tabs{height:42px;flex:none;display:flex;align-items:center;gap:4px;padding:0 100px 0 14px;border-bottom:1px solid var(--line);}
  .tab{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px 8px 0 0;color:var(--ink2);font-size:13px;}
  .tab.on{background:var(--bg);color:var(--ink);font-weight:600;box-shadow:inset 0 -2px 0 var(--ink);}
  .tabs .exit{margin-left:auto;display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:13px;}

  /* ── Home scrollable area ── */
  .home{flex:1;overflow-y:auto;padding:20px 28px 32px;}

  /* ── Comparador de IAs bar ── */
  .cmp-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid #e8eaed;border-radius:12px;background:#fff;margin-bottom:20px;}
  .cmp-avatars{display:flex;flex:none;}
  .cmp-avatars .av{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:700;color:#fff;flex:none;}
  .cmp-avatars .av:not(:first-child){margin-left:-7px;}
  .cmp-avatars .av.cl{background:var(--claude);}
  .cmp-avatars .av.cx{background:var(--codex);}
  .cmp-avatars .av.gm{background:var(--gemini);}
  .cmp-label{flex:none;}
  .cmp-label .t1{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2;}
  .cmp-label .t2{font-size:11.5px;color:#6b7280;line-height:1.3;}
  .cmp-divider{width:1px;height:32px;background:#e8eaed;flex:none;}
  .cmp-input{flex:1;min-width:0;}
  .cmp-input input{width:100%;border:none;outline:none;font-family:inherit;font-size:13.5px;color:var(--ink);background:transparent;}
  .cmp-input input::placeholder{color:var(--ink3);}
  .cmp-btn{flex:none;display:flex;align-items:center;gap:6px;background:var(--violet);color:#fff;font-size:13px;font-weight:600;padding:8px 15px;border-radius:8px;white-space:nowrap;}
  .cmp-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

  /* ── Workspace grid — 4 cols, gradient cards ── */
  .ws-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}

  .ws-card{border:1px solid rgba(0,0,0,.05);border-radius:12px;padding:15px;display:flex;flex-direction:column;gap:9px;transition:box-shadow .18s,border-color .18s;}
  .ws-card:hover{box-shadow:0 8px 24px -10px rgba(0,0,0,.16);border-color:rgba(0,0,0,.09);}

  .ai-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.7);border-radius:20px;padding:4px 10px 4px 8px;font-size:12px;font-weight:600;color:var(--ink2);width:fit-content;backdrop-filter:blur(4px);}
  .chip-dot{width:7px;height:7px;border-radius:50%;flex:none;}

  .ws-title{font-size:14px;font-weight:600;color:#26292e;line-height:1.35;}
  .ws-meta-time{font-size:11.5px;color:#7a8089;}

  .ws-bar{border-top:1px solid rgba(0,0,0,.06);padding-top:10px;margin-top:3px;display:flex;align-items:center;}
  .ws-icons{display:flex;gap:7px;color:rgba(0,0,0,.28);}
  .ws-icons svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .mode-row{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;color:var(--ink2);}
  .tog-track{width:28px;height:16px;border-radius:999px;display:flex;align-items:center;padding:2px;flex:none;}
  .tog-thumb{width:12px;height:12px;border-radius:50%;background:#fff;margin-left:auto;box-shadow:0 1px 3px rgba(0,0,0,.2);}

  /* ── Search highlight ── */
  .ws-card{transition:box-shadow .18s,border-color .18s,opacity .18s,transform .18s;}
  .ws-card.s-match{box-shadow:0 0 0 2.5px var(--violet),0 8px 24px -8px rgba(109,59,245,.22) !important;border-color:transparent !important;}
  .ws-card.s-dim{opacity:.22;transform:scale(.97);}

  /* ── New space card ── */
  .ws-card.ws-new{background:transparent !important;border:1px dashed rgba(0,0,0,.15) !important;cursor:pointer;align-items:center;justify-content:center;min-height:130px;gap:7px;}
  .ws-card.ws-new:hover{border-color:var(--violet) !important;background:rgba(109,59,245,.03) !important;box-shadow:none !important;}
  .ws-new-icon{color:rgba(0,0,0,.22);}
  .ws-new-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ws-card.ws-new:hover .ws-new-icon{color:var(--violet);}
  .ws-new-label{font-size:13px;font-weight:600;color:rgba(0,0,0,.35);}
  .ws-card.ws-new:hover .ws-new-label{color:var(--violet);}

  /* ── Lang pill ── */
  .lang-pill{position:fixed;right:22px;top:64px;z-index:60;display:inline-flex;gap:3px;padding:4px;background:#fff;border:1px solid var(--line2);border-radius:999px;box-shadow:0 10px 28px -14px rgba(20,22,28,.4);}
  .lang-pill button{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:999px;color:var(--ink2);}
  .lang-pill button.on{background:var(--navy);color:#fff;font-weight:600;}

  @media(max-width:920px){.side{display:none;} .search{display:none;}}
  @media(max-width:760px){.ws-grid{grid-template-columns:repeat(2,1fr);} .cmp-label .t2{display:none;} .tabs{padding-right:14px;}}
  @media(max-width:480px){.ws-grid{grid-template-columns:1fr;} .cmp-bar{flex-wrap:wrap;gap:8px;} .cmp-btn span{display:none;} .cmp-divider{display:none;}}
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="top">
    <button class="menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <div class="brand"><img src="../brand/logo-color.png" class="logo-img" alt="Terminal Sync" />Terminal Sync</div>
    <div class="search">
      <svg class="ic sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input data-i="search" placeholder="Buscar una sesión, archivo o computadora…" />
    </div>
    <div class="top-right">
      <span class="sync"><svg class="ic sm" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg><span data-i="sync">Sincronizar</span></span>
      <button class="btn-navy"><svg class="ic sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span data-i="newws">Nuevo espacio</span></button>
      <span class="avatar"><svg class="ic sm" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
    </div>
  </header>

  <div class="body">

    <!-- Sidebar -->
    <aside class="side">
      <div class="nav-i on"><svg class="ic" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span data-i="inicio">Inicio</span></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></svg><span data-i="ws">Espacios de Trabajo</span><span class="badge">23</span><svg class="ic sm chev" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><path d="m4 7 4 5-4 5"/><path d="M12 17h8"/></svg><span data-i="acciones">Acciones</span><svg class="ic sm chev" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><circle cx="8" cy="14" r="4"/><path d="m11 11 8-8 2 2-2 2 2 2-3 3-2-2"/></svg><span data-i="secretos">Secretos</span></div>
      <div class="nav-i"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span data-i="integr">Integraciones</span></div>
      <div class="spacer"></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4 1.5c0 1.5-2 2-2 3"/><path d="M12 17h.01"/></svg><span data-i="ayuda">Ayuda</span></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12.9V17H8v-2.1A7 7 0 0 1 12 2z"/></svg><span data-i="sugeren">Sugerencias</span></div>
      <div class="nav-f"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1Z"/></svg><span data-i="ajustes">Ajustes</span></div>
    </aside>

    <!-- Main content -->
    <div class="content">

      <!-- Original app tab bar -->
      <div class="tabs">
        <div class="tab on">
          <svg class="ic sm" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
          <span data-i="inicio">Inicio</span>
        </div>
        <span class="exit">
          <svg class="ic sm" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
          <span data-i="fullscreen">Pantalla completa</span>
        </span>
      </div>

      <!-- Home scrollable content -->
      <div class="home">

        <!-- Comparador de IAs bar -->
        <div class="cmp-bar">
          <div class="cmp-avatars">
            <div class="av cl">Cl</div>
            <div class="av cx">Cx</div>
            <div class="av gm">Gm</div>
          </div>
          <div class="cmp-label">
            <div class="t1" data-i="cmpTitle">Comparador de IAs</div>
            <div class="t2" data-i="cmpSub">Pregunta una vez a Claude, Codex y Gemini</div>
          </div>
          <div class="cmp-divider"></div>
          <div class="cmp-input">
            <input data-i="cmpPlaceholder" placeholder="¿Qué le preguntas hoy a las 3 IAs?" />
          </div>
          <button class="cmp-btn">
            <svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
            <span data-i="cmpBtn">Preguntar</span>
          </button>
        </div>

        <!-- Workspace grid (rendered by JS) -->
        <div class="ws-grid" id="wsGrid"></div>

      </div>
    </div>
  </div>
</div>

<div class="lang-pill"><button id="b-es" class="on">ES</button><button id="b-en">EN</button></div>

<script>
(function(){
  'use strict';

  const T = {
    es: {
      search:'Buscar una sesión, archivo o computadora…',
      sync:'Sincronizar', newws:'Nuevo espacio',
      inicio:'Inicio', ws:'Espacios de Trabajo', acciones:'Acciones',
      secretos:'Secretos', integr:'Integraciones', ayuda:'Ayuda', sugeren:'Sugerencias', ajustes:'Ajustes',
      fullscreen:'Pantalla completa',
      cmpTitle:'Comparador de IAs',
      cmpSub:'Pregunta una vez a Claude, Codex y Gemini',
      cmpPlaceholder:'¿Qué le preguntas hoy a las 3 IAs?',
      cmpBtn:'Preguntar',
      newCard:'Nuevo espacio',
      modeIA:'Modo IA',
      activeAgo: (n) => `Activo hace ${n}`,
    },
    en: {
      search:'Search a session, file or computer…',
      sync:'Sync', newws:'New space',
      inicio:'Home', ws:'Workspaces', acciones:'Actions',
      secretos:'Secrets', integr:'Integrations', ayuda:'Help', sugeren:'Suggestions', ajustes:'Settings',
      fullscreen:'Full screen',
      cmpTitle:'AI Comparator',
      cmpSub:'Ask Claude, Codex and Gemini at once',
      cmpPlaceholder:'What do you ask the 3 AIs today?',
      cmpBtn:'Ask',
      newCard:'New space',
      modeIA:'AI Mode',
      activeAgo: (n) => `Active ${n} ago`,
    }
  };

  const WORKSPACES = [
    { name:{es:'Sistema de Cotizaciones',en:'Quote System'},        sub:{es:'Propuestas automáticas para clientes',en:'Auto proposals for clients'},    ais:['cl','cx'],       time:{es:'2 min',en:'2 min'} },
    { name:{es:'Portal de Clientes',en:'Client Portal'},            sub:{es:'Acceso, pedidos y seguimiento',en:'Access, orders and tracking'},          ais:['cx','gm'],       time:{es:'1 hora',en:'1 hour'} },
    { name:{es:'Dashboard de Ventas',en:'Sales Dashboard'},         sub:{es:'Métricas en tiempo real',en:'Real-time metrics'},                          ais:['gm'],            time:{es:'5 min',en:'5 min'} },
    { name:{es:'Inventario Inteligente',en:'Smart Inventory'},      sub:{es:'Stock, alertas y recompras',en:'Stock, alerts and reorders'},               ais:['cl','cx','gm'],  time:{es:'3 horas',en:'3 hours'} },
    { name:{es:'Bot de WhatsApp',en:'WhatsApp Bot'},                sub:{es:'Respuestas automáticas 24/7',en:'Automatic replies 24/7'},                 ais:['cl'],            time:{es:'1 min',en:'1 min'} },
    { name:{es:'Generador de Reportes',en:'Report Generator'},      sub:{es:'PDFs semanales para el equipo',en:'Weekly PDFs for the team'},             ais:['gm','cl'],       time:{es:'Ayer',en:'Yesterday'} },
    { name:{es:'CRM Inmobiliario',en:'Real Estate CRM'},            sub:{es:'Propiedades, leads y citas',en:'Properties, leads and appointments'},      ais:['cx','cl'],       time:{es:'2 días',en:'2 days'} },
    { name:{es:'Agendamiento Online',en:'Online Scheduling'},       sub:{es:'Citas y recordatorios automáticos',en:'Appointments and auto-reminders'},  ais:['gm'],            time:{es:'4 horas',en:'4 hours'} },
    { name:{es:'Sistema de Notificaciones',en:'Notification System'},sub:{es:'Email, WhatsApp y SMS integrados',en:'Email, WhatsApp and SMS'},          ais:['cl','gm'],       time:{es:'3 días',en:'3 days'} },
  ];

  const AI_INFO = {
    cl: { dot:'#d97757', label:'Claude', grad:'linear-gradient(155deg,#fdf3ec 0%,#fbe6d8 100%)' },
    cx: { dot:'#10a37f', label:'Codex',  grad:'linear-gradient(155deg,#ecf9f3 0%,#dcf2e7 100%)' },
    gm: { dot:'#4a7cf0', label:'Gemini', grad:'linear-gradient(155deg,#eef3fd 0%,#dfe9fb 100%)' },
  };

  let lang = (new URLSearchParams(location.search).get('lang') === 'en') ? 'en' : 'es';
  let searchQuery = '';

  function applyLang() {
    document.querySelectorAll('[data-i]').forEach(el => {
      const k = el.dataset.i;
      const v = T[lang][k];
      if (v !== undefined && typeof v === 'string') {
        if (el.tagName === 'INPUT') el.placeholder = v;
        else el.textContent = v;
      }
    });
    document.getElementById('b-es').className = lang === 'es' ? 'on' : '';
    document.getElementById('b-en').className = lang === 'en' ? 'on' : '';
    renderGrid();
    applySearch();
  }

  function applySearch() {
    const q = searchQuery.toLowerCase().trim();
    const cards = document.querySelectorAll('#wsGrid .ws-card:not(.ws-new)');
    cards.forEach((card, i) => {
      const name = WORKSPACES[i].name[lang].toLowerCase();
      card.classList.remove('s-match', 's-dim');
      if (q) {
        if (name.includes(q)) card.classList.add('s-match');
        else card.classList.add('s-dim');
      }
    });
  }

  function renderGrid() {
    const grid = document.getElementById('wsGrid');
    grid.innerHTML = '';

    WORKSPACES.forEach(ws => {
      const card = document.createElement('div');
      card.className = 'ws-card';

      const ai = AI_INFO[ws.ais[0]];
      card.style.background = ai.grad;

      card.innerHTML = `
        <span class="ai-chip">
          <span class="chip-dot" style="background:${ai.dot}"></span>
          ${ai.label}
        </span>
        <div class="ws-title">${ws.name[lang]}</div>
        <div class="ws-meta-time">${T[lang].activeAgo(ws.time[lang])}</div>
        <div class="ws-bar">
          <div class="ws-icons">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            <svg viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </div>
          <div class="mode-row">
            <span>${T[lang].modeIA}</span>
            <span class="tog-track" style="background:${ai.dot}">
              <span class="tog-thumb"></span>
            </span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    // New space card
    const nc = document.createElement('div');
    nc.className = 'ws-card ws-new';
    nc.innerHTML = `
      <div class="ws-new-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
      <span class="ws-new-label">${T[lang].newCard}</span>
    `;
    grid.appendChild(nc);
  }

  document.getElementById('b-es').addEventListener('click', () => { lang='es'; applyLang(); });
  document.getElementById('b-en').addEventListener('click', () => { lang='en'; applyLang(); });

  document.querySelector('.search input').addEventListener('input', e => {
    searchQuery = e.target.value;
    applySearch();
  });

  applyLang();
})();
</script>
</body>
</html>
